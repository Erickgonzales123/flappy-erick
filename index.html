<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Flappy Bird - Erick</title>
    <style>
        body {
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        /* Contenedor para centrar todo */
        #game-container {
            position: relative;
            width: 400px;
            height: 600px;
        }
        canvas {
            border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            display: block;
        }
        /* Control deslizante de volumen HTML (para que sea interactivo) */
        #volume-control {
            position: absolute;
            top: 360px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            z-index: 10;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <input type="range" id="volume-control" min="0" max="1" step="0.1" value="0.5">
        
        <canvas id="gameCanvas" width="400" height="600"></canvas>
    </div>

    <script src="script.js"></script>
</body>
</html>
